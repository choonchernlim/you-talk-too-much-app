# .pre-commit-config.yaml
# Automates quality checks for the Python UV Template
# Reference: https://pre-commit.com

repos:
  # --- Ruff: Fast Linting, Sorting, and Formatting ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # --- Local Hooks: Ty & Pytest ---
  - repo: local
    hooks:
      - id: ty-check
        name: ty-check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pytest-meta
        name: pytest-meta
        entry: uv run pytest -s --cov=src --cov-report=term-missing
        language: system
        pass_filenames: false
        always_run: true

  # --- Safety & Standards ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
