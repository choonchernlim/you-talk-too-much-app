# .pre-commit-config.yaml
# Automates quality checks for the Python UV Template
# Reference: https://pre-commit.com

repos:
  # --- 1. Security & Safety: Detect Secrets ---
  - repo: local
    hooks:
      - id: check-secrets-baseline
        name: check-secrets-baseline
        entry: >
          uv run python -c 'import os, sys;
          msg = "CRITICAL: .secrets.baseline is missing. Generate it with: uvx detect-secrets scan > .secrets.baseline";
          exists = os.path.exists(".secrets.baseline");
          print(msg) if not exists else None;
          sys.exit(1 if not exists else 0)'
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package.lock

  # --- 2. Metadata & Consistency: UV Lock Check ---
  - repo: local
    hooks:
      - id: uv-lock-check
        name: uv-lock-check
        entry: uv lock --check
        language: system
        pass_filenames: false
        always_run: true

  # --- 3. Static File Integrity & OS Standards ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-case-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  # --- 4. Code Quality: Ruff (Lint & Format) ---
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]
        require_serial: true
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
        pass_filenames: false
        always_run: true

  # --- 5. Contract & Behavior: Typing & Tests ---
  - repo: local
    hooks:
      - id: ty-check
        name: ty-check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
